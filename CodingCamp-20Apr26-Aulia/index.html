<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="greeting-section">
      <p id="datetime" class="datetime"></p>
      <h1 id="greeting" class="greeting"></h1>
    </div>
    <div class="header-controls">
      <button id="nameBtn" class="icon-btn" title="Set your name">✏️</button>
      <button id="themeToggle" class="icon-btn" title="Toggle theme">🌙</button>
    </div>
  </header>

  <!-- Name Modal -->
  <div id="nameModal" class="modal hidden">
    <div class="modal-box">
      <h2>What's your name?</h2>
      <input type="text" id="nameInput" placeholder="Enter your name" maxlength="30" />
      <div class="modal-actions">
        <button id="saveName" class="btn primary">Save</button>
        <button id="cancelName" class="btn">Cancel</button>
      </div>
    </div>
  </div>

  <main class="main-grid">

    <!-- Focus Timer -->
    <section class="card timer-card">
      <h2 class="card-title">Focus Timer</h2>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-duration">
        <label for="timerMinutes">Duration (min):</label>
        <input type="number" id="timerMinutes" min="1" max="99" value="25" />
      </div>
      <div class="timer-controls">
        <button id="startBtn" class="btn primary">Start</button>
        <button id="stopBtn" class="btn" disabled>Stop</button>
        <button id="resetBtn" class="btn">Reset</button>
      </div>
    </section>

    <!-- To-Do List -->
    <section class="card todo-card">
      <h2 class="card-title">To-Do List</h2>
      <div class="todo-input-row">
        <input type="text" id="todoInput" placeholder="Add a new task..." maxlength="100" />
        <button id="addTodoBtn" class="btn primary">Add</button>
      </div>
      <div class="todo-toolbar">
        <span id="taskCount" class="task-count"></span>
        <select id="sortSelect" class="sort-select">
          <option value="default">Order: Default</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="done">Done last</option>
        </select>
      </div>
      <ul id="todoList" class="todo-list"></ul>
    </section>

    <!-- Quick Links -->
    <section class="card links-card">
      <h2 class="card-title">Quick Links</h2>
      <div class="link-input-row">
        <input type="text" id="linkName" placeholder="Label" maxlength="30" />
        <input type="url" id="linkUrl" placeholder="https://..." />
        <button id="addLinkBtn" class="btn primary">Add</button>
      </div>
      <div id="linksList" class="links-grid"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
